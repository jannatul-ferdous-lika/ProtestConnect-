<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Join Protest</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>🪧 Join the Protest</header>

  <div class="container">
    <form id="joinForm">
      <label>Protest Location:</label>
      <select id="location" required>
        <option value="">--Select--</option>
        <option value="Khulna">Khulna</option>
        <option value="Senhati">Senhati</option>
        <option value="Daulatpur">Daulatpur</option>
      </select>

      <label>Participation:</label>
      <select id="status" required>
        <option value="Interested">Interested</option>
        <option value="Confirmed">Confirmed</option>
      </select>

      <button type="submit">Submit Registration</button>
    </form>
  </div>

  <script>
    document.getElementById("joinForm").addEventListener("submit", function(e){
      e.preventDefault();

      const user = JSON.parse(localStorage.getItem("currentUser"));
      const location = document.getElementById("location").value;
      const status = document.getElementById("status").value;

      const participant = {
        name: user.name,
        email: user.email,
        photo: user.photo,
        location,
        status,
        hired: false
      };

      let all = JSON.parse(localStorage.getItem("participants")) || [];
      all.push(participant);
      localStorage.setItem("participants", JSON.stringify(all));

      alert("Registration Complete ✅");
      window.location.href = "view.html";
    });
  </script>
</body>
</html>
